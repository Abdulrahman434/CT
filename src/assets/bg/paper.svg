<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="pp">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="11"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.09  0 0 0 0 0.13  0 0 0 0 0.26  0 0 0 0.18 0"></feColorMatrix>
    </filter>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#1B2A5B" stop-opacity="0.22"></stop>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1B2A5B" stroke-width="0.7" opacity="0.09"></path>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#F5EFE1" opacity="0.4"></rect>
  <rect width="1920" height="1080" fill="url(#grid)"></rect>
  <rect width="1920" height="1080" filter="url(#pp)" opacity="0.55"></rect>
  <rect width="1920" height="1080" fill="url(#vig)"></rect>
</svg>